<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" font-family="Segoe UI, Roboto, sans-serif">
  <style>
    .bg{fill:#2b2b2b}
    .hdr{fill:#353535}
    .label{fill:#b8b8b8;font-size:12px}
    .lbl-bold{fill:#d5d5d5;font-size:13px;font-weight:600}
    .muted{fill:#7e7e7e;font-size:11px}
    .field{fill:#1c1c1c;stroke:#141414}
    .btn{fill:#3d3d3d;stroke:#1c1c1c}
    .btn-active{fill:#4772b3;stroke:#2e5798}
    .btn-text{fill:#d5d5d5;font-size:12px;font-weight:600}
    .btn-text-active{fill:#fff;font-size:12px;font-weight:700}
    .btn-primary{fill:#4772b3;stroke:#2e5798}
    .divider{stroke:#1c1c1c;stroke-width:1}
    .tab-text{fill:#9aa6b3;font-size:11px;font-weight:600;letter-spacing:.5px}
    .panel-stroke{stroke:#1c1c1c;stroke-width:1;fill:none}
    .check-on{fill:#5680c2;stroke:#1c1c1c}
  </style>
  <rect class="bg" width="480" height="420"/>
  <rect class="hdr" x="0" y="0" width="480" height="28"/>
  <text class="lbl-bold" x="14" y="19">▼ Tile UV Projector</text>
  <text class="muted" x="430" y="19">v1.2.1</text>

  <!-- Projection axis -->
  <text class="tab-text" x="14" y="54">PROJECTION AXIS</text>
  <line class="divider" x1="14" y1="60" x2="466" y2="60"/>
  <rect class="btn" x="14" y="70" width="84" height="28" rx="3"/>
  <text class="btn-text" x="56" y="88" text-anchor="middle">X</text>
  <rect class="btn" x="104" y="70" width="84" height="28" rx="3"/>
  <text class="btn-text" x="146" y="88" text-anchor="middle">Y</text>
  <rect class="btn-active" x="194" y="70" width="84" height="28" rx="3"/>
  <text class="btn-text-active" x="236" y="88" text-anchor="middle">Z</text>
  <rect class="btn" x="284" y="70" width="84" height="28" rx="3"/>
  <text class="btn-text" x="326" y="88" text-anchor="middle">Auto</text>
  <rect class="btn" x="374" y="70" width="92" height="28" rx="3"/>
  <text class="btn-text" x="420" y="88" text-anchor="middle">Best Fit</text>

  <!-- Tile size -->
  <text class="label" x="14" y="128">Tile Size (m)</text>
  <rect class="field" x="120" y="116" width="180" height="22" rx="3"/>
  <text class="lbl-bold" x="208" y="131" text-anchor="middle">1.000</text>
  <text class="muted" x="310" y="131">× = 1 m / repeat</text>

  <text class="label" x="14" y="160">Rotation</text>
  <rect class="btn" x="120" y="148" width="44" height="22" rx="3"/>
  <text class="btn-text" x="142" y="163" text-anchor="middle">0°</text>
  <rect class="btn-active" x="168" y="148" width="44" height="22" rx="3"/>
  <text class="btn-text-active" x="190" y="163" text-anchor="middle">90°</text>
  <rect class="btn" x="216" y="148" width="44" height="22" rx="3"/>
  <text class="btn-text" x="238" y="163" text-anchor="middle">180°</text>
  <rect class="btn" x="264" y="148" width="44" height="22" rx="3"/>
  <text class="btn-text" x="286" y="163" text-anchor="middle">270°</text>

  <!-- Offsets -->
  <text class="label" x="14" y="200">U Offset</text>
  <rect class="field" x="120" y="188" width="160" height="22" rx="3"/>
  <text class="lbl-bold" x="200" y="203" text-anchor="middle">0.000</text>
  <text class="label" x="296" y="200">V Offset</text>
  <rect class="field" x="356" y="188" width="110" height="22" rx="3"/>
  <text class="lbl-bold" x="411" y="203" text-anchor="middle">0.000</text>

  <!-- Preview -->
  <rect class="check-on" x="14" y="232" width="14" height="14" rx="2"/>
  <path d="M17 239 L20 242 L25 236" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="36" y="244">Preview (non-destructive)</text>
  <text class="muted" x="36" y="262">writes to a temp UV map · click Apply to commit</text>

  <!-- Target UV map -->
  <text class="label" x="14" y="296">Target UV Map</text>
  <rect class="field" x="120" y="284" width="346" height="22" rx="3"/>
  <text class="lbl-bold" x="293" y="299" text-anchor="middle">UVMap</text>

  <!-- Primary buttons -->
  <rect class="btn-primary" x="14" y="324" width="290" height="36" rx="4"/>
  <text class="btn-text-active" x="159" y="347" text-anchor="middle">▶ Project UVs</text>
  <rect class="btn" x="312" y="324" width="154" height="36" rx="4"/>
  <text class="btn-text" x="389" y="347" text-anchor="middle">Cancel Preview</text>

  <text class="muted" x="14" y="386">Tip: 1 m tile size keeps texel density consistent across mismatched mesh sizes.</text>

  <rect class="panel-stroke" x="0.5" y="0.5" width="479" height="419"/>
</svg>
