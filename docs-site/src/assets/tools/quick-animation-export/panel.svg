<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" font-family="Segoe UI, Roboto, sans-serif">
  <style>
    .bg{fill:#2b2b2b}.hdr{fill:#353535}
    .label{fill:#b8b8b8;font-size:12px}
    .lbl-bold{fill:#d5d5d5;font-size:13px;font-weight:600}
    .muted{fill:#7e7e7e;font-size:11px}
    .field{fill:#1c1c1c;stroke:#141414}
    .btn{fill:#3d3d3d;stroke:#1c1c1c}
    .btn-primary{fill:#4772b3;stroke:#2e5798}
    .btn-text{fill:#d5d5d5;font-size:12px;font-weight:600}
    .btn-text-on{fill:#fff;font-size:13px;font-weight:700}
    .row{fill:#303030}
    .row-sel{fill:#2a3a52;stroke:#4772b3}
    .check-on{fill:#5680c2;stroke:#1c1c1c}
    .check-off{fill:#1c1c1c;stroke:#404040}
    .tab-text{fill:#9aa6b3;font-size:11px;font-weight:600;letter-spacing:.5px}
    .divider{stroke:#1c1c1c;stroke-width:1}
    .panel-stroke{stroke:#1c1c1c;stroke-width:1;fill:none}
  </style>
  <rect class="bg" width="480" height="480"/>
  <rect class="hdr" x="0" y="0" width="480" height="28"/>
  <text class="lbl-bold" x="14" y="19">▼ Quick Animation Export</text>
  <text class="muted" x="430" y="19">v1.0.9</text>

  <!-- Output folder -->
  <text class="label" x="14" y="56">Output Folder</text>
  <rect class="field" x="100" y="44" width="320" height="22" rx="3"/>
  <text class="muted" x="108" y="59">D:/anims/hero/</text>
  <rect class="btn" x="426" y="44" width="40" height="22" rx="3"/>
  <text class="btn-text" x="446" y="60" text-anchor="middle">📁</text>

  <!-- Name pattern -->
  <text class="label" x="14" y="86">Name Pattern</text>
  <rect class="field" x="100" y="74" width="366" height="22" rx="3"/>
  <text class="lbl-bold" x="108" y="89">{armature}_{action}.fbx</text>

  <!-- Filter -->
  <text class="label" x="14" y="116">Filter Prefix</text>
  <rect class="field" x="100" y="104" width="120" height="22" rx="3"/>
  <text class="lbl-bold" x="108" y="119">anim_</text>
  <text class="label" x="232" y="116">Range</text>
  <rect class="field" x="280" y="104" width="186" height="22" rx="3"/>
  <text class="lbl-bold" x="290" y="119">Action Range</text>
  <text class="muted" x="452" y="119" text-anchor="end">▾</text>

  <!-- Actions list -->
  <text class="tab-text" x="14" y="152">ACTIONS · 6 found</text>
  <line class="divider" x1="14" y1="158" x2="466" y2="158"/>

  <rect class="row-sel" x="14" y="166" width="452" height="28" rx="3"/>
  <rect class="check-on" x="22" y="173" width="14" height="14" rx="2"/>
  <path d="M25 180 L28 183 L33 177" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="44" y="184">anim_idle</text>
  <text class="muted" x="450" y="184" text-anchor="end">120 frames</text>

  <rect class="row-sel" x="14" y="198" width="452" height="28" rx="3"/>
  <rect class="check-on" x="22" y="205" width="14" height="14" rx="2"/>
  <path d="M25 212 L28 215 L33 209" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="44" y="216">anim_walk</text>
  <text class="muted" x="450" y="216" text-anchor="end">48 frames</text>

  <rect class="row-sel" x="14" y="230" width="452" height="28" rx="3"/>
  <rect class="check-on" x="22" y="237" width="14" height="14" rx="2"/>
  <path d="M25 244 L28 247 L33 241" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="44" y="248">anim_run</text>
  <text class="muted" x="450" y="248" text-anchor="end">32 frames</text>

  <rect class="row" x="14" y="262" width="452" height="28" rx="3"/>
  <rect class="check-off" x="22" y="269" width="14" height="14" rx="2"/>
  <text class="lbl-bold" x="44" y="280">anim_jump</text>
  <text class="muted" x="450" y="280" text-anchor="end">60 frames</text>

  <rect class="row" x="14" y="294" width="452" height="28" rx="3"/>
  <rect class="check-off" x="22" y="301" width="14" height="14" rx="2"/>
  <text class="lbl-bold" x="44" y="312">anim_die</text>
  <text class="muted" x="450" y="312" text-anchor="end">90 frames</text>

  <rect class="row" x="14" y="326" width="452" height="28" rx="3"/>
  <rect class="check-off" x="22" y="333" width="14" height="14" rx="2"/>
  <text class="lbl-bold" x="44" y="344">idle_scratch_head</text>
  <text class="muted" x="450" y="344" text-anchor="end">filtered out</text>

  <!-- Select all / none -->
  <rect class="btn" x="14" y="368" width="100" height="22" rx="3"/>
  <text class="btn-text" x="64" y="383" text-anchor="middle">Select All</text>
  <rect class="btn" x="118" y="368" width="100" height="22" rx="3"/>
  <text class="btn-text" x="168" y="383" text-anchor="middle">Select None</text>
  <rect class="btn" x="222" y="368" width="120" height="22" rx="3"/>
  <text class="btn-text" x="282" y="383" text-anchor="middle">Filter by Tag…</text>

  <!-- Export button -->
  <rect class="btn-primary" x="14" y="404" width="452" height="40" rx="4"/>
  <text class="btn-text-on" x="240" y="429" text-anchor="middle">▶ Export Selected Actions (3)</text>

  <rect class="panel-stroke" x="0.5" y="0.5" width="479" height="479"/>
</svg>
