<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" font-family="Segoe UI, Roboto, sans-serif">
  <style>
    .bg{fill:#2b2b2b}.hdr{fill:#353535}
    .label{fill:#b8b8b8;font-size:12px}
    .lbl-bold{fill:#d5d5d5;font-size:13px;font-weight:600}
    .muted{fill:#7e7e7e;font-size:11px}
    .field{fill:#1c1c1c;stroke:#141414}
    .btn{fill:#3d3d3d;stroke:#1c1c1c}
    .btn-primary{fill:#4772b3;stroke:#2e5798}
    .btn-text{fill:#d5d5d5;font-size:12px;font-weight:600}
    .btn-text-on{fill:#fff;font-size:14px;font-weight:700}
    .tab-text{fill:#9aa6b3;font-size:11px;font-weight:600;letter-spacing:.5px}
    .divider{stroke:#1c1c1c;stroke-width:1}
    .check-on{fill:#5680c2;stroke:#1c1c1c}
    .check-off{fill:#1c1c1c;stroke:#404040}
    .panel-stroke{stroke:#1c1c1c;stroke-width:1;fill:none}
    .badge{fill:#3a341f;stroke:#69581f}
    .badge-text{fill:#f0d98c;font-size:10px;font-weight:700}
  </style>
  <rect class="bg" width="480" height="380"/>
  <rect class="hdr" x="0" y="0" width="480" height="28"/>
  <text class="lbl-bold" x="14" y="19">▼ Anim Layers Quick Export</text>
  <rect class="badge" x="380" y="6" width="42" height="16" rx="3"/><text class="badge-text" x="401" y="17" text-anchor="middle">BETA</text>
  <text class="muted" x="430" y="19">v0.3.0</text>

  <!-- Armature picker -->
  <text class="label" x="14" y="56">Armature</text>
  <rect class="field" x="92" y="44" width="374" height="22" rx="3"/>
  <text class="lbl-bold" x="100" y="59">⛑  rig_hero</text>
  <text class="muted" x="450" y="59" text-anchor="end">▾</text>

  <!-- Output path -->
  <text class="label" x="14" y="92">Output Path</text>
  <rect class="field" x="92" y="80" width="328" height="22" rx="3"/>
  <text class="muted" x="100" y="95">D:/anim_exports/hero/</text>
  <rect class="btn" x="426" y="80" width="40" height="22" rx="3"/>
  <text class="btn-text" x="446" y="96" text-anchor="middle">📁</text>

  <!-- Frame range -->
  <text class="tab-text" x="14" y="128">FRAME RANGE</text>
  <line class="divider" x1="14" y1="134" x2="466" y2="134"/>
  <rect class="btn-primary" x="14" y="144" width="100" height="22" rx="3"/>
  <text class="btn-text-on" x="64" y="159" text-anchor="middle">Scene</text>
  <rect class="btn" x="118" y="144" width="100" height="22" rx="3"/>
  <text class="btn-text" x="168" y="159" text-anchor="middle">Custom</text>
  <text class="label" x="232" y="159">Start</text>
  <rect class="field" x="266" y="144" width="56" height="22" rx="3"/>
  <text class="lbl-bold" x="294" y="159" text-anchor="middle">1</text>
  <text class="label" x="332" y="159">End</text>
  <rect class="field" x="362" y="144" width="56" height="22" rx="3"/>
  <text class="lbl-bold" x="390" y="159" text-anchor="middle">240</text>

  <!-- Bake options -->
  <text class="tab-text" x="14" y="194">BAKE OPTIONS</text>
  <line class="divider" x1="14" y1="200" x2="466" y2="200"/>
  <rect class="check-on" x="14" y="212" width="14" height="14" rx="2"/>
  <path d="M17 219 L20 222 L25 216" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="36" y="224">Bake Visual NLA Result</text>

  <rect class="check-off" x="14" y="234" width="14" height="14" rx="2"/>
  <text class="label" x="36" y="246">Replace Active Action (clears NLA)</text>

  <rect class="check-off" x="14" y="256" width="14" height="14" rx="2"/>
  <text class="label" x="36" y="268">Bake Root Motion to root bone</text>

  <text class="label" x="14" y="290">Sample Step</text>
  <rect class="field" x="120" y="278" width="80" height="22" rx="3"/>
  <text class="lbl-bold" x="160" y="293" text-anchor="middle">1</text>
  <text class="muted" x="208" y="293">every Nth frame</text>

  <!-- Big button -->
  <rect class="btn-primary" x="14" y="316" width="452" height="44" rx="4"/>
  <text class="btn-text-on" x="240" y="343" text-anchor="middle">▶ Quick Export</text>

  <rect class="panel-stroke" x="0.5" y="0.5" width="479" height="379"/>
</svg>
