<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Segoe UI, Roboto, sans-serif">
  <style>
    .bg{fill:#2b2b2b}
    .toolbar{fill:#353535;stroke:#1c1c1c}
    .row-bg{fill:#252525}
    .row-alt{fill:#2b2b2b}
    .track-label{fill:#d5d5d5;font-size:11px;font-weight:600}
    .muted{fill:#9aa6b3;font-size:11px}
    .strip-base{fill:#3d6ea3;stroke:#1c1c1c}
    .strip-add{fill:#7d5fa3;stroke:#1c1c1c}
    .strip-override{fill:#a05f5f;stroke:#1c1c1c}
    .strip-text{fill:#fff;font-size:11px;font-weight:600}
    .frame-tick{stroke:#404040;stroke-width:0.6}
    .frame-label{fill:#7e7e7e;font-size:10px}
    .arrow{stroke:#5680c2;stroke-width:2;fill:none;marker-end:url(#a)}
    .arrow-head{fill:#5680c2}
    .result-strip{fill:#4772b3;stroke:#fff;stroke-width:1.5}
    .label{fill:#d5d5d5;font-size:13px;font-weight:600}
  </style>

  <rect class="bg" width="720" height="280"/>
  <text class="label" x="20" y="20">NLA Editor · before export</text>

  <!-- Toolbar -->
  <rect class="toolbar" x="20" y="34" width="680" height="22"/>
  <text class="muted" x="30" y="48">Track  •  Edit  •  Marker  •  View</text>

  <!-- Frame ruler -->
  <g transform="translate(140,60)">
    <line class="frame-tick" x1="0" y1="0" x2="0" y2="180"/>
    <line class="frame-tick" x1="100" y1="0" x2="100" y2="180"/>
    <line class="frame-tick" x1="200" y1="0" x2="200" y2="180"/>
    <line class="frame-tick" x1="300" y1="0" x2="300" y2="180"/>
    <line class="frame-tick" x1="400" y1="0" x2="400" y2="180"/>
    <line class="frame-tick" x1="500" y1="0" x2="500" y2="180"/>
    <text class="frame-label" x="0" y="-2">1</text>
    <text class="frame-label" x="100" y="-2">48</text>
    <text class="frame-label" x="200" y="-2">96</text>
    <text class="frame-label" x="300" y="-2">144</text>
    <text class="frame-label" x="400" y="-2">192</text>
    <text class="frame-label" x="500" y="-2">240</text>
  </g>

  <!-- Tracks (3 rows) -->
  <g transform="translate(20,72)">
    <!-- Row 1: base -->
    <rect class="row-bg" x="0" y="0" width="680" height="40"/>
    <text class="track-label" x="10" y="24">base · locomotion</text>
    <rect class="strip-base" x="120" y="8" width="520" height="24" rx="3"/>
    <text class="strip-text" x="380" y="24" text-anchor="middle">run_cycle</text>

    <!-- Row 2: additive aim -->
    <rect class="row-alt" x="0" y="44" width="680" height="40"/>
    <text class="track-label" x="10" y="68">add · aim_pose</text>
    <rect class="strip-add" x="180" y="52" width="320" height="24" rx="3"/>
    <text class="strip-text" x="340" y="68" text-anchor="middle">aim_overlay</text>

    <!-- Row 3: override lean -->
    <rect class="row-bg" x="0" y="88" width="680" height="40"/>
    <text class="track-label" x="10" y="112">override · lean</text>
    <rect class="strip-override" x="280" y="96" width="160" height="24" rx="3"/>
    <text class="strip-text" x="360" y="112" text-anchor="middle">lean_left</text>
  </g>

  <!-- Arrow to baked result -->
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
      <polygon points="0,0 6,4 0,8" class="arrow-head"/>
    </marker>
  </defs>

  <line class="arrow" x1="700" y1="120" x2="700" y2="220"/>

  <!-- Baked strip -->
  <text class="muted" x="20" y="218">→ exported FBX action</text>
  <rect class="row-bg" x="20" y="226" width="680" height="38"/>
  <rect class="result-strip" x="140" y="232" width="520" height="26" rx="3"/>
  <text class="strip-text" x="400" y="249" text-anchor="middle">hero_baked  ·  one clean action, NLA preserved upstream</text>
</svg>
