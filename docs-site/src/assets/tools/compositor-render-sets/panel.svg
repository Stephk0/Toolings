<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440" font-family="Segoe UI, Roboto, sans-serif">
  <style>
    .bg{fill:#2b2b2b}.hdr{fill:#353535}
    .label{fill:#b8b8b8;font-size:12px}
    .lbl-bold{fill:#d5d5d5;font-size:13px;font-weight:600}
    .muted{fill:#7e7e7e;font-size:11px}
    .field{fill:#1c1c1c;stroke:#141414}
    .btn{fill:#3d3d3d;stroke:#1c1c1c}
    .btn-primary{fill:#4772b3;stroke:#2e5798}
    .btn-text{fill:#d5d5d5;font-size:12px;font-weight:600}
    .btn-text-on{fill:#fff;font-size:13px;font-weight:700}
    .row{fill:#252525}
    .row-sel{fill:#2a3a52;stroke:#4772b3}
    .check-on{fill:#5680c2;stroke:#1c1c1c}
    .check-off{fill:#1c1c1c;stroke:#404040}
    .tab-text{fill:#9aa6b3;font-size:11px;font-weight:600;letter-spacing:.5px}
    .divider{stroke:#1c1c1c;stroke-width:1}
    .panel-stroke{stroke:#1c1c1c;stroke-width:1;fill:none}
  </style>
  <rect class="bg" width="480" height="440"/>
  <rect class="hdr" x="0" y="0" width="480" height="28"/>
  <text class="lbl-bold" x="14" y="19">▼ Compositor Render Sets</text>
  <text class="muted" x="430" y="19">v1.9.0</text>

  <text class="tab-text" x="14" y="54">RENDER SETS · 4 defined</text>
  <line class="divider" x1="14" y1="60" x2="466" y2="60"/>

  <rect class="row-sel" x="14" y="70" width="452" height="32" rx="3"/>
  <rect class="check-on" x="22" y="79" width="14" height="14" rx="2"/>
  <path d="M25 86 L28 89 L33 83" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="44" y="90">beauty_pass</text>
  <text class="muted" x="450" y="90" text-anchor="end">1920×1080 · PNG</text>

  <rect class="row" x="14" y="106" width="452" height="32" rx="3"/>
  <rect class="check-on" x="22" y="115" width="14" height="14" rx="2"/>
  <path d="M25 122 L28 125 L33 119" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="44" y="126">cryptomatte</text>
  <text class="muted" x="450" y="126" text-anchor="end">1920×1080 · EXR</text>

  <rect class="row" x="14" y="142" width="452" height="32" rx="3"/>
  <rect class="check-on" x="22" y="151" width="14" height="14" rx="2"/>
  <path d="M25 158 L28 161 L33 155" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="44" y="162">aov_normal_depth</text>
  <text class="muted" x="450" y="162" text-anchor="end">1920×1080 · EXR</text>

  <rect class="row" x="14" y="178" width="452" height="32" rx="3"/>
  <rect class="check-off" x="22" y="187" width="14" height="14" rx="2"/>
  <text class="lbl-bold" x="44" y="198">denoise_only</text>
  <text class="muted" x="450" y="198" text-anchor="end">disabled this batch</text>

  <!-- Set list actions -->
  <rect class="btn" x="14" y="216" width="100" height="24" rx="3"/>
  <text class="btn-text" x="64" y="232" text-anchor="middle">+ Add Set</text>
  <rect class="btn" x="118" y="216" width="100" height="24" rx="3"/>
  <text class="btn-text" x="168" y="232" text-anchor="middle">– Remove</text>
  <rect class="btn" x="222" y="216" width="120" height="24" rx="3"/>
  <text class="btn-text" x="282" y="232" text-anchor="middle">Create Node Setup</text>

  <text class="tab-text" x="14" y="264">OPTIMIZATIONS</text>
  <line class="divider" x1="14" y1="270" x2="466" y2="270"/>

  <rect class="check-on" x="14" y="282" width="14" height="14" rx="2"/>
  <path d="M17 289 L20 292 L25 286" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="36" y="294">Mute Unused File Output Nodes</text>

  <rect class="check-on" x="14" y="304" width="14" height="14" rx="2"/>
  <path d="M17 311 L20 314 L25 308" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="36" y="316">Only Sync Modifiers in Render Set</text>

  <rect class="check-off" x="14" y="326" width="14" height="14" rx="2"/>
  <text class="lbl-bold" x="36" y="338">Override Output Path per Set</text>

  <text class="tab-text" x="14" y="370">BATCH RENDER</text>
  <line class="divider" x1="14" y1="376" x2="466" y2="376"/>

  <rect class="btn-primary" x="14" y="386" width="290" height="38" rx="4"/>
  <text class="btn-text-on" x="159" y="410" text-anchor="middle">▶ Render Enabled Sets (3)</text>
  <rect class="btn" x="312" y="386" width="154" height="38" rx="4"/>
  <text class="btn-text" x="389" y="410" text-anchor="middle">Render Current Set</text>

  <rect class="panel-stroke" x="0.5" y="0.5" width="479" height="439"/>
</svg>
