<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="Segoe UI, Roboto, sans-serif">
  <style>
    .bg{fill:#2b2b2b}.hdr{fill:#353535}
    .label{fill:#b8b8b8;font-size:12px}
    .lbl-bold{fill:#d5d5d5;font-size:13px;font-weight:600}
    .muted{fill:#7e7e7e;font-size:11px}
    .field{fill:#1c1c1c;stroke:#141414}
    .btn{fill:#3d3d3d;stroke:#1c1c1c}
    .btn-primary{fill:#4772b3;stroke:#2e5798}
    .btn-text{fill:#d5d5d5;font-size:12px;font-weight:600}
    .btn-text-on{fill:#fff;font-size:13px;font-weight:700}
    .check-on{fill:#5680c2;stroke:#1c1c1c}
    .check-off{fill:#1c1c1c;stroke:#404040}
    .tab-text{fill:#9aa6b3;font-size:11px;font-weight:600;letter-spacing:.5px}
    .divider{stroke:#1c1c1c;stroke-width:1}
    .panel-stroke{stroke:#1c1c1c;stroke-width:1;fill:none}
  </style>
  <rect class="bg" width="480" height="360"/>
  <rect class="hdr" x="0" y="0" width="480" height="28"/>
  <text class="lbl-bold" x="14" y="19">▼ Skin Transfer Setup</text>
  <text class="muted" x="430" y="19">v1.3.0</text>

  <text class="tab-text" x="14" y="54">SOURCE &amp; TARGET</text>
  <line class="divider" x1="14" y1="60" x2="466" y2="60"/>

  <text class="label" x="14" y="86">Source</text>
  <rect class="field" x="80" y="74" width="386" height="22" rx="3"/>
  <text class="lbl-bold" x="88" y="89">⛑  rig_hero · base_mesh</text>

  <text class="label" x="14" y="116">Target</text>
  <rect class="field" x="80" y="104" width="386" height="22" rx="3"/>
  <text class="lbl-bold" x="88" y="119">⛑  rig_hero · clothing_jacket</text>

  <text class="tab-text" x="14" y="154">OPTIONS</text>
  <line class="divider" x1="14" y1="160" x2="466" y2="160"/>

  <rect class="check-on" x="14" y="172" width="14" height="14" rx="2"/>
  <path d="M17 179 L20 182 L25 176" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="36" y="184">Copy Armature modifier from source</text>

  <rect class="check-on" x="14" y="194" width="14" height="14" rx="2"/>
  <path d="M17 201 L20 204 L25 198" stroke="#fff" stroke-width="2" fill="none"/>
  <text class="lbl-bold" x="36" y="206">Match by Bone Group</text>

  <rect class="check-off" x="14" y="216" width="14" height="14" rx="2"/>
  <text class="lbl-bold" x="36" y="228">Bake after transfer (destructive)</text>

  <text class="label" x="14" y="258">Mapping</text>
  <rect class="field" x="100" y="246" width="366" height="22" rx="3"/>
  <text class="lbl-bold" x="108" y="261">Nearest Face Interpolated</text>
  <text class="muted" x="450" y="261" text-anchor="end">▾</text>

  <!-- Primary buttons -->
  <rect class="btn-primary" x="14" y="288" width="290" height="38" rx="4"/>
  <text class="btn-text-on" x="159" y="312" text-anchor="middle">▶ Configure Transfer</text>
  <rect class="btn" x="312" y="288" width="154" height="38" rx="4"/>
  <text class="btn-text" x="389" y="312" text-anchor="middle">Bake Weights</text>

  <rect class="panel-stroke" x="0.5" y="0.5" width="479" height="359"/>
</svg>
